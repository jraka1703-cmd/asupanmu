<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asupanmu</title>

<style>
body {
  margin: 0;
  background: #0d0d0d;
  font-family: sans-serif;
  color: white;
}

.navbar {
  position: sticky;
  top: 0;
  background: #0d0d0d;
  padding: 12px;
  z-index: 999;
}

.title {
  font-size: 20px;
  font-weight: bold;
  color: #7f5af0;
}

.search {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 20px;
  border: none;
  background: #1a1a1a;
  color: white;
}

.container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.card, .ad-card {
  position: relative;
  border-radius: 15px;
  overflow: hidden;
  background: #111;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-title {
  position: absolute;
  bottom: 0;
  padding: 10px;
  font-size: 13px;
  background: linear-gradient(transparent, black);
}

/* Native Ad style biar nyaru */
.ad-card {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="title">Asupanmu</div>
  <input id="search" class="search" placeholder="Search...">
</div>

<div id="videos" class="container"></div>

<!-- 🔥 SOCIAL BAR (langsung dari Adsterra) -->
<script type="text/javascript">
  // GANTI dengan script social bar kamu dari Adsterra
</script>

<script>
let videosGlobal = [];
let popShown = false;

// 🔥 POPUNDER CONTROL (1x saja)
function triggerPopunder() {
  if (!localStorage.getItem("popShown")) {
    localStorage.setItem("popShown", "true");

    // ⚠️ GANTI dengan script popunder dari Adsterra
    window.open("https://www.profitablecpmratenetwork.com/s6szeryj1j?key=67a910e3b4387aa420b25f4a4bfa41b1", "_blank");
  }
}

async function loadVideos() {
  const res = await fetch('/api/videos');
  const data = await res.json();

  videosGlobal = data;
  render(data);
}

function render(videos) {
  const container = document.getElementById('videos');
  container.innerHTML = "";

  videos.forEach((v, i) => {

    // 🎯 INSERT NATIVE ADS TIAP 6 VIDEO
    if (i !== 0 && i % 6 === 0) {
      const ad = document.createElement('div');
      ad.className = 'ad-card';

      ad.innerHTML = `
        <!-- 🔥 GANTI DENGAN NATIVE BANNER CODE -->
        <script type="text/javascript">
          // paste native banner adsterra disini
        <\/script>
      `;

      container.appendChild(ad);
    }

    const el = document.createElement('div');
    el.className = 'card';

    el.innerHTML = `
      <img src="${v.thumbnail}">
      <div class="card-title">${v.title}</div>
    `;

    el.onclick = () => {
      triggerPopunder(); // 🔥 trigger iklan hanya saat klik
      window.location.href = `https://vidara.so/v/${v.filecode}`;
    };

    container.appendChild(el);
  });
}

// SEARCH
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();

  const filtered = videosGlobal.filter(v =>
    v.title.toLowerCase().includes(q)
  );

  render(filtered);
});

loadVideos();
</script>

</body>
</html>
