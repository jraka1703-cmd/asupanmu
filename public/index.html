<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asupanmu</title>

<style>
body {
  margin: 0;
  background: #0d0d0d;
  color: white;
  font-family: sans-serif;
}

.navbar {
  position: sticky;
  top: 0;
  background: #0d0d0d;
  padding: 12px;
  z-index: 999;
}

.title {
  color: #7f5af0;
  font-weight: bold;
}

.container {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  position: relative;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-title {
  position: absolute;
  bottom: 0;
  background: linear-gradient(transparent, black);
  padding: 8px;
  font-size: 12px;
}

.badge {
  position: absolute;
  top: 5px;
  left: 5px;
  background: rgba(0,0,0,0.7);
  padding: 2px 6px;
  font-size: 10px;
}

.ad {
  height: 200px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="title">Asupanmu</div>
</div>

<div id="videos" class="container"></div>

<script>
let page = 1;
let loading = false;
let adCount = 0;

// POPUNDER 1x
function pop() {
  if (!localStorage.getItem("p")) {
    localStorage.setItem("p", 1);
    window.open("https://www.profitablecpmratenetwork.com/s6szeryj1j?key=67a910e3b4387aa420b25f4a4bfa41b1");
  }
}

// LOAD DATA
async function load() {
  if (loading) return;
  loading = true;

  const r = await fetch(`/api/videos?page=${page}`);
  const d = await r.json();

  render(d.videos);

  page++;
  loading = false;
}

// ADS FIX (NO DUPLICATE ID)
function adUnit() {
  const div = document.createElement("div");
  div.className = "ad";

  const script = document.createElement("script");
  script.src = "https://pl29343712.profitablecpmratenetwork.com/d6c7cfa2fbe3ee841c92a4f50371bf35/invoke.js";
  script.async = true;

  setTimeout(() => {
    div.appendChild(script);
  }, 200);

  return div;
}

// RENDER
function render(videos) {
  const c = document.getElementById("videos");

  videos.forEach(v => {

    adCount++;

    // iklan tiap 6 video
    if (adCount > 4 && adCount % 6 === 0) {
      c.appendChild(adUnit());
    }

    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <img src="${v.thumbnail}">
      <div class="badge">${v.source}</div>
      <div class="card-title">${v.title}</div>
    `;

    el.onclick = () => {
      pop();
      window.location.href = v.link;
    };

    c.appendChild(el);
  });
}

// SCROLL LOAD
window.addEventListener("scroll", () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
    load();
  }
});

// INIT
load();
</script>

<!-- SOCIAL BAR -->
<script src="https://pl29343713.profitablecpmratenetwork.com/9a/69/24/9a6924d62fcb5f212667f72bfbb2378f.js"></script>

</body>
</html>
