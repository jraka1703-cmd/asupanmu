<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asupanmu</title>

<style>
body {
  margin: 0;
  background: #0d0d0d;
  font-family: sans-serif;
  color: white;
}

.navbar {
  position: sticky;
  top: 0;
  background: #0d0d0d;
  padding: 12px;
  z-index: 999;
}

.title {
  font-size: 20px;
  font-weight: bold;
  color: #7f5af0;
}

.search {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 20px;
  border: none;
  background: #1a1a1a;
  color: white;
}

.container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  position: relative;
  border-radius: 15px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-title {
  position: absolute;
  bottom: 0;
  padding: 10px;
  font-size: 13px;
  background: linear-gradient(transparent, black);
}
</style>
</head>

<body>

<div class="navbar">
  <div class="title">Asupanmu</div>
  <input id="search" class="search" placeholder="Search...">
</div>

<div id="videos" class="container"></div>

<script>
let videosGlobal = [];

async function loadVideos() {
  const res = await fetch('/api/videos');
  const data = await res.json();

  videosGlobal = data;
  render(data);
}

function render(videos) {
  const container = document.getElementById('videos');
  container.innerHTML = "";

  videos.forEach(v => {
    const el = document.createElement('div');
    el.className = 'card';

    el.innerHTML = `
      <img src="${v.thumbnail}">
      <div class="card-title">${v.title}</div>
    `;

    // 🔥 klik ke halaman asli seperti gambar
    el.onclick = () => {
      window.location.href = `https://vidara.so/v/${v.filecode}`;
    };

    container.appendChild(el);
  });
}

// SEARCH
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();

  const filtered = videosGlobal.filter(v =>
    v.title.toLowerCase().includes(q)
  );

  render(filtered);
});

loadVideos();
</script>

</body>
</html>
