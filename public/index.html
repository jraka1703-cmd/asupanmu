<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asupanmu</title>

<style>
body {
  margin: 0;
  background: #0d0d0d;
  font-family: sans-serif;
  color: white;
}

.navbar {
  position: sticky;
  top: 0;
  background: #0d0d0d;
  padding: 12px;
  z-index: 999;
}

.title {
  font-size: 20px;
  font-weight: bold;
  color: #7f5af0;
}

.search {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 20px;
  border: none;
  background: #1a1a1a;
  color: white;
}

.container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.card, .ad-card {
  border-radius: 15px;
  overflow: hidden;
  background: #111;
  position: relative;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-title {
  position: absolute;
  bottom: 0;
  padding: 10px;
  font-size: 13px;
  background: linear-gradient(transparent, black);
}

.badge {
  position: absolute;
  top: 5px;
  left: 5px;
  background: rgba(0,0,0,0.6);
  padding: 3px 6px;
  font-size: 10px;
  border-radius: 5px;
}

.ad-card {
  height: 200px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="title">Asupanmu</div>
  <input id="search" class="search" placeholder="Search video...">
</div>

<div id="videos" class="container"></div>

<script>
let videosGlobal = [];
let page = 1;
let loading = false;
let hasMore = true;
let adIndex = 0;

// 🔥 Popunder (1x saja)
function triggerPopunder() {
  if (!localStorage.getItem("popShown")) {
    localStorage.setItem("popShown", "true");

    window.open(
      "https://www.profitablecpmratenetwork.com/s6szeryj1j?key=67a910e3b4387aa420b25f4a4bfa41b1",
      "_blank"
    );
  }
}

// 🔥 Load videos
async function loadVideos() {
  if (loading || !hasMore) return;

  loading = true;

  const res = await fetch(`/api/videos?page=${page}`);
  const data = await res.json();

  videosGlobal.push(...data.videos);
  render(data.videos);

  page++;
  loading = false;
}

// 🔥 Native Ads (script kamu)
function createNativeAd() {
  const ad = document.createElement('div');
  ad.className = 'ad-card';

  const script = document.createElement('script');
  script.async = true;
  script.src = "https://pl29343712.profitablecpmratenetwork.com/d6c7cfa2fbe3ee841c92a4f50371bf35/invoke.js";

  const container = document.createElement('div');
  container.id = "container-d6c7cfa2fbe3ee841c92a4f50371bf35";

  ad.appendChild(script);
  ad.appendChild(container);

  return ad;
}

// 🔥 Render
function render(videos) {
  const container = document.getElementById('videos');

  videos.forEach((v) => {

    adIndex++;

    // Delay + tiap 6 item
    if (adIndex > 4 && adIndex % 6 === 0) {
      container.appendChild(createNativeAd());
    }

    const el = document.createElement('div');
    el.className = 'card';

    el.innerHTML = `
      <img src="${v.thumbnail}" loading="lazy">
      <div class="badge">${v.source}</div>
      <div class="card-title">${v.title}</div>
    `;

    el.onclick = () => {
      triggerPopunder();
      window.location.href = v.link;
    };

    container.appendChild(el);
  });
}

// 🔥 Infinite scroll
window.addEventListener('scroll', () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
    loadVideos();
  }
});

// 🔍 Search
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();

  const container = document.getElementById('videos');
  container.innerHTML = "";

  const filtered = videosGlobal.filter(v =>
    v.title.toLowerCase().includes(q)
  );

  render(filtered);
});

// init
loadVideos();
</script>

<!-- 🔥 SOCIAL BAR -->
<script src="https://pl29343713.profitablecpmratenetwork.com/9a/69/24/9a6924d62fcb5f212667f72bfbb2378f.js"></script>

</body>
</html>
