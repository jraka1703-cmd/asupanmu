<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asupanmu</title>

<style>
body {
  margin: 0;
  background: #0d0d0d;
  font-family: sans-serif;
  color: white;
}

.navbar {
  position: sticky;
  top: 0;
  background: #0d0d0d;
  padding: 12px;
  z-index: 999;
}

.title {
  font-size: 20px;
  font-weight: bold;
  color: #7f5af0;
}

.search {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 20px;
  border: none;
  background: #1a1a1a;
  color: white;
}

.container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  position: relative;
  border-radius: 15px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-title {
  position: absolute;
  bottom: 0;
  padding: 10px;
  font-size: 13px;
  background: linear-gradient(transparent, black);
}

.ads {
  padding: 10px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="title">Asupanmu</div>
  <input id="search" class="search" placeholder="Search...">
</div>

<!-- ADS TOP -->
<div class="ads">
  <script async src="https://pl29343712.profitablecpmratenetwork.com/d6c7cfa2fbe3ee841c92a4f50371bf35/invoke.js"></script>
</div>

<div id="videos" class="container"></div>

<script>
let videosGlobal = [];
let page = 1;
let loading = false;

async function loadVideos() {
  if (loading) return;
  loading = true;

  const res = await fetch(`/api/videos?page=${page}`);
  const data = await res.json();

  videosGlobal.push(...data.videos);

  render(videosGlobal);

  page = data.nextPage;
  loading = false;
}

function render(videos) {
  const container = document.getElementById('videos');
  container.innerHTML = "";

  videos.forEach((v, i) => {
    const el = document.createElement('div');
    el.className = 'card';

    el.innerHTML = `
      <img src="${v.thumbnail}">
      <div class="card-title">${v.title}</div>
    `;

    el.onclick = () => {
      window.location.href = v.link;
    };

    container.appendChild(el);

    // 🔥 inject ads tiap 8 video
    if ((i + 1) % 8 === 0) {
      const ads = document.createElement("div");
      ads.className = "ads";
      ads.innerHTML = `
        <script src="https://pl29343713.profitablecpmratenetwork.com/9a/69/24/9a6924d62fcb5f212667f72bfbb2378f.js"><\/script>
      `;
      container.appendChild(ads);
    }
  });
}

// SEARCH
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();

  const filtered = videosGlobal.filter(v =>
    v.title.toLowerCase().includes(q)
  );

  render(filtered);
});

// INFINITE SCROLL
window.addEventListener("scroll", () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
    loadVideos();
  }
});

// FIRST LOAD
loadVideos();
</script>

</body>
</html>
