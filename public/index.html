<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asupanmu</title>

<style>
body {
  margin: 0;
  background: #0d0d0d;
  font-family: sans-serif;
  color: white;
}

.navbar {
  position: sticky;
  top: 0;
  background: #0d0d0d;
  padding: 12px;
  z-index: 999;
}

.title {
  font-size: 20px;
  font-weight: bold;
  color: #7f5af0;
}

.search {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 20px;
  border: none;
  background: #1a1a1a;
  color: white;
}

.container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.card, .ad-card {
  border-radius: 15px;
  overflow: hidden;
  background: #111;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-title {
  position: absolute;
  bottom: 0;
  padding: 10px;
  font-size: 13px;
  background: linear-gradient(transparent, black);
}

.ad-card {
  height: 200px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="title">Asupanmu</div>
  <input id="search" class="search" placeholder="Search video...">
</div>

<div id="videos" class="container"></div>

<script>
let videosGlobal = [];

// 🔥 Popunder (1x saja)
function triggerPopunder() {
  if (!localStorage.getItem("popShown")) {
    localStorage.setItem("popShown", "true");

    window.open(
      "https://www.profitablecpmratenetwork.com/s6szeryj1j?key=67a910e3b4387aa420b25f4a4bfa41b1",
      "_blank"
    );
  }
}

async function loadVideos() {
  const res = await fetch('/api/videos');
  const data = await res.json();

  videosGlobal = data;
  render(data);
}

function createNativeAd() {
  const ad = document.createElement('div');
  ad.className = 'ad-card';

  const script = document.createElement('script');
  script.async = true;
  script.src = "https://pl29343712.profitablecpmratenetwork.com/d6c7cfa2fbe3ee841c92a4f50371bf35/invoke.js";

  const container = document.createElement('div');
  container.id = "container-d6c7cfa2fbe3ee841c92a4f50371bf35";

  ad.appendChild(script);
  ad.appendChild(container);

  return ad;
}

function render(videos) {
  const container = document.getElementById('videos');
  container.innerHTML = "";

  videos.forEach((v, i) => {

    // 🔥 Native ads tiap 6 video
    if (i !== 0 && i % 6 === 0) {
      container.appendChild(createNativeAd());
    }

    const el = document.createElement('div');
    el.className = 'card';

    el.innerHTML = `
      <img src="${v.thumbnail}">
      <div class="card-title">${v.title}</div>
    `;

    el.onclick = () => {
      triggerPopunder();
      window.location.href = `https://vidara.so/v/${v.filecode}`;
    };

    container.appendChild(el);
  });
}

// 🔍 SEARCH
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();

  const filtered = videosGlobal.filter(v =>
    v.title.toLowerCase().includes(q)
  );

  render(filtered);
});

loadVideos();
</script>

<!-- 🔥 SOCIAL BAR (WAJIB DI SINI) -->

</body>
</html>
