<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asupanmu</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0d0d0d;
  color: white;
}

/* NAVBAR */
.navbar {
  position: sticky;
  top: 0;
  background: #0d0d0d;
  padding: 10px;
  z-index: 1000;
}

.title {
  font-size: 22px;
  font-weight: bold;
  background: linear-gradient(45deg, #7f5af0, #2cb67d);
  -webkit-background-clip: text;
  color: transparent;
}

/* SEARCH */
.search {
  margin-top: 10px;
  width: 100%;
  padding: 12px;
  border-radius: 20px;
  border: none;
  background: #1a1a1a;
  color: white;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  position: relative;
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-title {
  position: absolute;
  bottom: 0;
  padding: 10px;
  font-size: 14px;
  background: linear-gradient(transparent, black);
}
</style>
</head>

<body>

<div class="navbar">
  <div class="title">Asupanmu</div>
  <input type="text" class="search" placeholder="Search..." id="search">
</div>

<div class="container" id="videos"></div>

<script>
let allVideos = [];

async function loadVideos() {
  const res = await fetch('/api/videos');
  const data = await res.json();
  allVideos = data;
  renderVideos(data);
}

function renderVideos(videos) {
  const container = document.getElementById("videos");
  container.innerHTML = "";

  videos.forEach(v => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${v.thumbnail}" />
      <div class="card-title">${v.title}</div>
    `;

    div.onclick = () => {
      window.open(`https://vidara.so/${v.filecode}`, "_blank");
    };

    container.appendChild(div);
  });
}

/* SEARCH */
document.getElementById("search").addEventListener("input", (e) => {
  const keyword = e.target.value.toLowerCase();
  const filtered = allVideos.filter(v =>
    v.title.toLowerCase().includes(keyword)
  );
  renderVideos(filtered);
});

loadVideos();
</script>

</body>
</html>
